name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "k8s/**"

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: starttech-backend-api
  EKS_CLUSTER: starttech-cluster

jobs:
  test-build-deploy:
    name: Test, build, scan, push and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: Run Go tests
        working-directory: backend
        run: go test ./...

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: >
          docker build
          -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          backend/

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"

      - name: Push image to Amazon ECR
        run: docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Update deployment manifest with new image tag
        run: >
          sed -i "s|image: IMAGE_PLACEHOLDER|image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}|"
          k8s/deployment.yaml

      - name: Connect to EKS
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Deploy to Kubernetes
        run: kubectl apply -f k8s/

      - name: Verify rollout
        run: kubectl rollout status deployment/backend-api --timeout=180s
